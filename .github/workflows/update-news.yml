name: 뉴스 자동 업데이트

on:
  schedule:
    - cron: '0 1 * * 1,4'   # 매주 월·목 오전 10시 (KST)
  workflow_dispatch:          # 수동 실행 가능

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests deep-translator

      - name: 뉴스 업데이트 실행
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python news_updater.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add news.json
          git diff --staged --quiet || git commit -m "뉴스 자동 업데이트 $(date +'%Y-%m-%d')"
          git push
